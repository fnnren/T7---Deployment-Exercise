<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Design Layout</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --primary: #1e293b; /* Deep Slate */
            --accent: #4f46e5;  /* Electric Indigo */
            --bg: #f8fafc;      /* Soft Off-White */
        }
        
        body {
            display: grid;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            grid-template-rows: auto auto 1fr auto;
            grid-template-areas: 
                "header"
                "nav"
                "main"
                "footer";
        }
        
        @media (min-width: 768px) {
            body {
                grid-template-columns: 220px 1fr;
                grid-template-rows: auto 1fr auto;
                grid-template-areas: 
                    "header header"
                    "nav main"
                    "footer footer";
            }
        }
        
        header {
            grid-area: header;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            padding: 1.5rem;
            text-align: center;
        }
        
        nav {
            grid-area: nav;
            background: #e2e8f0;
            color: var(--primary);
            padding: 1.5rem;
        }
        
        main {
            grid-area: main;
            padding: 2rem;
            background: var(--bg);
        }
        
        footer {
            grid-area: footer;
            background: var(--primary);
            color: #94a3b8;
            padding: 1rem;
            text-align: center;
            font-size: 0.9rem;
        }
        
        .card {
            border: none;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        
        .btn-primary {
            background-color: var(--accent);
            border: none;
        }
        
        .btn-primary:hover {
            background-color: #4338ca;
        }
        
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px 8px 0 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>Title page</h1>
    </header>

    <nav>
        <ul class="list-unstyled">
            <li class="mb-2 font-semibold">Dashboard</li>
            <li class="mb-2 text-slate-600">Analytics</li>
            <li class="mb-2 text-slate-600">Settings</li>
        </ul>
    </nav>

    <main>
        <section class="mb-5">
            <h2 class="text-2xl font-bold text-slate-800 mb-4">Bootstrap Integration</h2>
            <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4">
                <div class="col">
                    <div class="card">
                        <img src="https://via.placeholder.com/300x150">
                        <div class="card-body">
                            <h5>Solution A</h5>
                            <button class="btn btn-primary">Buy Now</button>
                        </div>
                    </div>
                </div>
                <div class="col">
                    <div class="card">
                        <img src="https://via.placeholder.com/300x150">
                        <div class="card-body">
                            <h5>Solution B</h5>
                            <button class="btn btn-primary">Buy Now</button>
                        </div>
                    </div>
                </div>
                <div class="col">
                    <div class="card">
                        <img src="https://via.placeholder.com/300x150">
                        <div class="card-body">
                            <h5>Solution C</h5>
                            <button class="btn btn-primary">Buy Now</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <h2 class="text-2xl font-bold text-slate-800 mb-4">Tailwind Integration</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                <div class="border rounded-xl p-4 bg-white shadow-lg">
                    <img src="https://via.placeholder.com/300x150">
                    <h3 class="font-bold mt-3">Service 1</h3>
                    <button class="mt-3 bg-indigo-600 text-white px-4 py-2 rounded-lg">Learn More</button>
                </div>
                <div class="border rounded-xl p-4 bg-white shadow-lg">
                    <img src="https://via.placeholder.com/300x150">
                    <h3 class="font-bold mt-3">Service 2</h3>
                    <button class="mt-3 bg-indigo-600 text-white px-4 py-2 rounded-lg">Learn More</button>
                </div>
                <div class="border rounded-xl p-4 bg-white shadow-lg">
                    <img src="https://via.placeholder.com/300x150">
                    <h3 class="font-bold mt-3">Service 3</h3>
                    <button class="mt-3 bg-indigo-600 text-white px-4 py-2 rounded-lg">Learn More</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        &copy; 2026 Fheren Daniel Dailig
    </footer>

</body>
</html>
